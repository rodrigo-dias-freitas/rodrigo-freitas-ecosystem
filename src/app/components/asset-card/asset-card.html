<div class="asset-card" [ngClass]="asset.change_percent >= 0 ? 'bull-border' : 'bear-border'">
  <div class="card-header">
    <span class="symbol">{{ asset.symbol }}</span>
    <span class="change" [style.color]="asset.change_percent >= 0 ? '#00ff88' : '#ff4444'">
      {{ asset.change_percent >= 0 ? '▲' : '▼' }} {{ asset.change_percent | number:'1.2-2' }}%
    </span>
  </div>
  
  <div class="price-section">
    <h2 class="price">{{ asset.price | number:'1.2-2' }}</h2>
  </div>

  </div>
