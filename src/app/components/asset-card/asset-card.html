<div class="asset-card">
  <div class="card-header">
    <span class="symbol">{{ symbol }}</span>
    <span class="change" [ngClass]="change >= 0 ? 'positive' : 'negative'">
      {{ change >= 0 ? '+' : '' }}{{ change | number:'1.2-2' }}%
    </span>
  </div>
  
  <div class="price-section">
    <h2 class="current-price">{{ price | number:'1.0-3' }}</h2>
    <p class="label">{{ name }}</p>
  </div>

  <div class="market-range">
    <div class="range-info">
      <span>Mín: {{ min | number:'1.0-3' }}</span>
      <span>Máx: {{ max | number:'1.0-3' }}</span>
    </div>
    <div class="range-bar">
      <div class="progress" [style.width.%]="percentage"></div>
    </div>
  </div>
</div>
